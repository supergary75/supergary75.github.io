<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 3 - Coaching Experience Sharing</title>
  <style>
    :root{--text:#1f2430;--muted:#5d6472;--accent:#cc5a2f;--accent-deep:#8d3010;--surface:rgba(255,250,242,.92);--line:rgba(31,36,48,.1);--shadow:0 24px 60px rgba(64,43,26,.12)}*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at top left, rgba(204,90,47,.16), transparent 34%),linear-gradient(180deg,#f7f1e7 0%,#f2ece3 100%)}.page{width:min(1180px, calc(100% - 32px));margin:0 auto;padding:32px 0 48px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:20px}.toolbar-right{display:flex;align-items:center;gap:12px}.language-select,.back-link,.enter-link{display:inline-flex;align-items:center;justify-content:center;padding:12px 18px;border-radius:14px;text-decoration:none;font-size:14px;font-weight:700}.language-select{border:1px solid rgba(31,36,48,.12);background:#fffdfa;color:var(--text);cursor:pointer}.back-link{color:var(--accent-deep);background:rgba(204,90,47,.1)}.enter-link{margin-top:16px;padding:10px 14px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;width:fit-content}.hero,.panel{padding:32px;border-radius:28px;background:var(--surface);border:1px solid rgba(255,255,255,.65);box-shadow:var(--shadow);margin-bottom:22px}.eyebrow{display:inline-flex;padding:8px 14px;border-radius:999px;background:rgba(204,90,47,.1);color:var(--accent-deep);font-size:14px;font-weight:700}h1{margin:18px 0 12px;font-size:clamp(32px,4vw,52px);line-height:1.1}.subtitle{margin:0 0 18px;color:var(--accent-deep);font-size:18px;font-weight:700}p{margin:0;color:var(--muted);line-height:1.8;font-size:16px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.card{padding:22px;border-radius:22px;background:rgba(255,255,255,.78);border:1px solid var(--line);display:flex;flex-direction:column}.card h2{margin:0 0 10px;font-size:22px;line-height:1.3}.note{margin-top:16px;padding:16px 18px;border-radius:18px;background:rgba(204,90,47,.08);color:var(--accent-deep);font-size:14px;font-weight:700;line-height:1.7}@media (max-width:900px){.topbar,.toolbar-right{flex-direction:column;align-items:stretch}.hero,.panel{padding:24px 20px}.grid{grid-template-columns:1fr}}
  </style>
  <script src="assets/access-gate.js"></script>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="back-link" id="backLink" href="index.html" data-i18n="backLink">返回首页</a>
      <div class="toolbar-right">
        <select class="language-select" id="languageSelect" aria-label="Language selector">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>
    <section class="hero">
      <div class="eyebrow" data-i18n="eyebrow">Module 03</div>
      <h1 data-i18n="title">教练经验分享</h1>
      <p class="subtitle" data-i18n="subtitle">围绕教练培养体系搭建更完整的团队支持方法</p>
      <p data-i18n="description">这一模块聚焦教练经验沉淀与团队培养体系建设，适合用于分享长期培养学生团队时的结构化方法。</p>
    </section>
    <section class="panel">
      <div class="grid">
        <article class="card">
          <h2 data-i18n="card1Title">1. 知识、技术和个人能力</h2>
          <p data-i18n="card1Body">整理学生在成长过程中需要建立的知识结构、技术能力、沟通表达、责任感和个人习惯。</p>
          <a class="enter-link" id="link1" href="module3-knowledge-detail.html" data-i18n="enterButton">进入子页面</a>
        </article>
        <article class="card">
          <h2 data-i18n="card2Title">2. 培训课程体系的建立</h2>
          <p data-i18n="card2Body">把零散经验整理成课程结构，形成从基础到进阶、从技术到协作的培训路径。</p>
          <a class="enter-link" id="link2" href="module3-curriculum-detail.html" data-i18n="enterButton">进入子页面</a>
        </article>
        <article class="card">
          <h2 data-i18n="card3Title">3. 执行与反馈机制</h2>
          <p data-i18n="card3Body">训练不是练得越多越好，而是要用数据、记录和复盘形成持续改进的闭环。</p>
          <a class="enter-link" id="link3" href="module3-training-detail.html" data-i18n="enterButton">进入子页面</a>
        </article>
      </div>
      <div class="note" data-i18n="note">这个页面现在已经适合继续往下补充案例、流程图、课程大纲和训练模板。</div>
    </section>
  </main>
  <script>
    const translations = {
      zh: {
        pageTitle: "第三模块 - 教练经验分享",
        backLink: "返回首页",
        eyebrow: "模块 03",
        title: "教练经验分享",
        subtitle: "围绕教练培养体系搭建更完整的团队支持方法",
        description: "这一模块聚焦教练经验沉淀与团队培养体系建设，适合用于分享长期培养学生团队时的结构化方法。",
        card1Title: "1. 知识、技术和个人能力",
        card1Body: "整理学生在成长过程中需要建立的知识结构、技术能力、沟通表达、责任感和个人习惯。",
        card2Title: "2. 培训课程体系的建立",
        card2Body: "把零散经验整理成课程结构，形成从基础到进阶、从技术到协作的培训路径。",
        card3Title: "3. 执行与反馈机制",
        card3Body: "训练不是练得越多越好，而是要用数据、记录和复盘形成持续改进的闭环。",
        enterButton: "进入子页面",
        note: "这个页面现在已经适合继续往下补充案例、流程图、课程大纲和训练模板。"
      },
      en: {
        pageTitle: "Module 3 - Coaching Experience Sharing",
        backLink: "Back to Home",
        eyebrow: "Module 03",
        title: "Coaching Experience Sharing",
        subtitle: "Build a more complete team-support method around coaching development",
        description: "This module focuses on coaching experience and team-development systems, and is suitable for sharing structured methods for long-term student team growth.",
        card1Title: "1. Knowledge, Technical and Personal Capability",
        card1Body: "Organize the knowledge structure, technical skills, communication, responsibility, and personal habits students need during their growth.",
        card2Title: "2. Training Curriculum System Building",
        card2Body: "Turn scattered experience into a curriculum structure and form a path from basics to advanced levels, and from technical skills to collaboration.",
        card3Title: "3. Execution and Feedback Mechanism",
        card3Body: "Training works best not by doing more sessions, but by creating a loop of data, records, and review that drives constant improvement.",
        enterButton: "Enter Subpage",
        note: "This page is now ready for you to keep adding cases, flowcharts, curriculum outlines, and training templates."
      }
    };

    function buildBilingualContent() {
      const escapeHtml = (value) => String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
      const bilingual = {};
      Object.keys(translations.zh).forEach((key) => {
        const zhValue = translations.zh[key];
        const enValue = translations.en[key];
        if (key === "pageTitle" && typeof zhValue === "string" && typeof enValue === "string") {
          bilingual[key] = `${escapeHtml(zhValue)} / ${escapeHtml(enValue)}`;
          return;
        }
        if (typeof zhValue === "string" && typeof enValue === "string") {
          bilingual[key] = `<span style="color:var(--muted);font-weight:500;opacity:.65">${escapeHtml(zhValue)}</span><span style="opacity:.3"> / </span><span style="color:var(--text);font-weight:900">${escapeHtml(enValue)}</span>`;
        } else {
          bilingual[key] = escapeHtml(enValue ?? zhValue);
        }
      });
      return bilingual;
    }

    const languageSelect = document.getElementById("languageSelect");
    const backLink = document.getElementById("backLink");
    const link1 = document.getElementById("link1");
    const link2 = document.getElementById("link2");
    const link3 = document.getElementById("link3");

    function applyLanguage(lang) {
      const safeLang = ["zh", "en"].includes(lang) ? lang : "zh";
      const content = safeLang === "en" ? buildBilingualContent() : translations.zh;
      document.documentElement.lang = safeLang === "zh" ? "zh-CN" : "en";
      document.title = content.pageTitle;
      languageSelect.value = safeLang;
      localStorage.setItem("makexTrainingLang", safeLang);
      backLink.href = `index.html?lang=${safeLang}`;
      link1.href = `module3-knowledge-detail.html?lang=${safeLang}`;
      link2.href = `module3-curriculum-detail.html?lang=${safeLang}`;
      link3.href = `module3-training-detail.html?lang=${safeLang}`;
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        const key = node.getAttribute("data-i18n");
        if (content[key]) node.innerHTML = content[key];
      });
    }

    languageSelect.addEventListener("change", (event) => applyLanguage(event.target.value));
    const params = new URLSearchParams(window.location.search);
    applyLanguage(params.get("lang") || localStorage.getItem("makexTrainingLang") || "zh");
  </script>
  <script defer src="assets/no-copy.js"></script>
</body>
</html>
